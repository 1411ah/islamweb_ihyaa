name: Scrape & Build EPUB

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'test | scan | resume | fix | build | full'
        required: true
        default: 'test'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml ebooklib

      - name: Run scraper
        run: python scraper.py ${{ github.event.inputs.mode }}

      - name: Commit JSON output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "[${{ github.event.inputs.mode }}] $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Upload EPUB as Release
        if: hashFiles('output/ithaf_alsada.epub') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: epub-${{ github.run_number }}
          name: "اتحاف السادة المتقين — ${{ github.event.inputs.mode }} #${{ github.run_number }}"
          body: |
            ملف EPUB لكتاب اتحاف السادة المتقين بشرح احياء علوم الدين
            mode: ${{ github.event.inputs.mode }}
          files: output/ithaf_alsada.epub