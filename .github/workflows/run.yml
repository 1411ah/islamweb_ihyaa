name: Scrape & Build EPUB

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'test | scan | resume | build | full'
        required: true
        default: 'test'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350       # أقل من حد GitHub 6 ساعات
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml ebooklib

      - name: Run scraper
        run: python scraper.py ${{ github.event.inputs.mode }}

      - name: Commit output to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "[${{ github.event.inputs.mode }}] $(date +'%Y-%m-%d %H:%M')"
          git push