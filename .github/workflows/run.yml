name: Scrape & Build EPUB

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'test | scan | resume | build | full'
        required: true
        default: 'test'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml ebooklib

      - name: Run scraper
        run: python scraper.py ${{ github.event.inputs.mode }}

      # ── حفظ كل JSON في الريبو (sections + progress) ───────────
      - name: Commit JSON output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/toc.json output/valid_nodes.json output/scan_progress.json || true
          git add output/sections/ || true
          git diff --cached --quiet || git commit -m "[${{ github.event.inputs.mode }}] $(date +'%Y-%m-%d %H:%M')"
          git push

      # ── رفع EPUB كـ GitHub Release (بدون حد حجم) ───────────────
      - name: Upload EPUB as Release
        if: hashFiles('output/ithaf_alsada.epub') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: epub-${{ github.run_number }}
          name: "إتحاف السادة المتقين — ${{ github.event.inputs.mode }} #${{ github.run_number }}"
          body: |
            ملف EPUB لكتاب إتحاف السادة المتقين بشرح إحياء علوم الدين
            - mode: ${{ github.event.inputs.mode }}
            - تاريخ البناء: ${{ github.run_started_at }}
          files: output/ithaf_alsada.epub